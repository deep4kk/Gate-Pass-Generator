<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate Pass Generator</title>
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo gate-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </div>
        <span class="logo-text">Gate Pass</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="my-passes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
          <span>My Passes</span>
        </button>
        <button class="nav-item" data-view="new-pass">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          <span>New Pass</span>
        </button>
        <button class="nav-item security-only" data-view="approvals" style="display: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline></svg>
          <span>Approvals</span>
          <span class="badge" id="approvalBadge" style="display: none;">0</span>
        </button>
        <button class="nav-item" data-view="verify">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect></svg>
          <span>Verify QR</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <span class="user-name" id="userName">Loading...</span>
            <span class="user-role" id="userRole">-</span>
          </div>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="top-bar">
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
      </header>
      
      <div class="content-area">
        <section class="view active" id="dashboardView">
          <div class="dashboard-grid">
            <div class="stats-row">
              <div class="stat-card"><div class="stat-icon total"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg></div><div><span class="stat-label">Total Passes</span><span class="stat-value" id="statTotal">0</span></div></div>
              <div class="stat-card"><div class="stat-icon approved"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div><span class="stat-label">Approved</span><span class="stat-value" id="statApproved">0</span></div></div>
              <div class="stat-card"><div class="stat-icon pending"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div><div><span class="stat-label">Pending</span><span class="stat-value" id="statPending">0</span></div></div>
            </div>
            <div class="passes-grid" id="recentPasses"></div>
          </div>
        </section>
        
        <section class="view" id="myPassesView">
          <h2>My Gate Passes</h2>
          <div class="passes-grid" id="myPassesList"></div>
        </section>
        
        <section class="view" id="newPassView">
          <div class="form-card">
            <h2>Request Gate Pass</h2>
            <form id="passForm">
              <div class="form-group">
                <label>Pass Type</label>
                <select id="passType" required>
                  <option value="">Select type</option>
                  <option value="Visitor">Visitor</option>
                  <option value="Material">Material</option>
                  <option value="Vehicle">Vehicle</option>
                  <option value="Emergency">Emergency</option>
                </select>
              </div>
              <div class="form-group"><label>Visitor/Purpose Name</label><input type="text" id="visitorName" required placeholder="Name of visitor or purpose"></div>
              <div class="form-group"><label>Purpose</label><textarea id="purpose" rows="2" required></textarea></div>
              <div class="form-group"><label>Destination</label><input type="text" id="destination" required></div>
              <div class="form-group" id="vehicleGroup" style="display: none;"><label>Vehicle Number</label><input type="text" id="vehicleNumber" placeholder="ABC 1234"></div>
              <div class="form-row">
                <div class="form-group"><label>Valid From</label><input type="datetime-local" id="validFrom" required></div>
                <div class="form-group"><label>Valid Until</label><input type="datetime-local" id="validUntil" required></div>
              </div>
              <div class="form-actions"><button type="button" class="btn btn-secondary" onclick="switchView('dashboard')">Cancel</button><button type="submit" class="btn btn-primary">Create Pass</button></div>
            </form>
          </div>
        </section>
        
        <section class="view" id="approvalsView">
          <h2>Pending Approvals</h2>
          <div class="approvals-list" id="approvalsList"></div>
        </section>
        
        <section class="view" id="verifyView">
          <div class="form-card" style="text-align: center;">
            <h2>Verify Gate Pass</h2>
            <p style="color: var(--gray-500); margin-bottom: 24px;">Enter Pass ID to verify validity</p>
            <div class="form-group"><input type="text" id="verifyInput" placeholder="GP-2024-XXXXXX" style="text-align: center; font-size: 18px;"></div>
            <button class="btn btn-primary" onclick="verifyPass()" style="width: 100%;">Verify</button>
            <div id="verifyResult" style="margin-top: 24px;"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <?!= include('JavaScript'); ?>
</body>
</html>
